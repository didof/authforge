name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: github.repository == 'didof/authforge' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: npm-publish

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Use trusted-publishing-capable npm
        run: npm install -g npm@^11.5.1

      - name: Show tool versions
        run: |
          node --version
          npm --version
          pnpm --version

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Verify release
        run: pnpm run verify:release

      - name: Publish packages
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./packages/core/package.json').version")"

          publish_if_needed() {
            local package_name="$1"
            local tarball="$2"

            if npm view "${package_name}@${VERSION}" version >/dev/null 2>&1; then
              echo "${package_name}@${VERSION} already exists; skipping"
              return 0
            fi

            npm publish "${tarball}" --access public
          }

          publish_if_needed "@aeonkey/core" "./artifacts/aeonkey-core-${VERSION}.tgz"
          publish_if_needed "@aeonkey/argon2" "./artifacts/aeonkey-argon2-${VERSION}.tgz"
          publish_if_needed "@aeonkey/sqlite" "./artifacts/aeonkey-sqlite-${VERSION}.tgz"
          publish_if_needed "@aeonkey/webauthn-oslo" "./artifacts/aeonkey-webauthn-oslo-${VERSION}.tgz"
          publish_if_needed "@aeonkey/express" "./artifacts/aeonkey-express-${VERSION}.tgz"
