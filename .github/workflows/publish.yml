name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: github.repository == 'didof/authforge' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: npm-publish

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Use trusted-publishing-capable npm
        run: npm install -g npm@^11.5.1

      - name: Show tool versions
        run: |
          node --version
          npm --version
          pnpm --version

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Verify release
        run: pnpm run verify:release

      - name: Publish packages
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./packages/core/package.json').version")"

          npm publish "./artifacts/authforge-core-${VERSION}.tgz" --access public
          npm publish "./artifacts/authforge-argon2-${VERSION}.tgz" --access public
          npm publish "./artifacts/authforge-sqlite-${VERSION}.tgz" --access public
          npm publish "./artifacts/authforge-webauthn-oslo-${VERSION}.tgz" --access public
          npm publish "./artifacts/authforge-express-${VERSION}.tgz" --access public
